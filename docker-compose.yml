# Claude OSINT — деплой одной командой: docker compose up -d --build
# Затем открой http://localhost:8000.
#
# Образ включает реальные OSINT-бинарники (theHarvester, subfinder, gitleaks,
# trufflehog, Blackbird, GHunt) — работают автоматически внутри enrich (не только
# на Vercel, где их нет). GHunt требует РАЗОВОЙ ручной авторизации оператора:
#   docker compose exec osint ghunt login
# (вставляєш СВОЇ Google-куки — розширення GHunt Companion або вручну). Volume
# ghunt_creds нижче зберігає її між перезапусками/пересборками образу.
#
# Безопасность: данные расследований чувствительны. Для доступа извне localhost
# задай OSINT_TOKEN (включает токен-авторизацию) и поставь перед сервисом
# reverse-proxy с TLS (Caddy/nginx). Без токена сервис открыт всем в сети.

services:
  osint:
    build: .
    image: claude-osint:latest
    ports:
      - "8000:8000"
    environment:
      # Мульти-юзер: включить авторизацию и засеять админа при первом старте.
      - OSINT_AUTH=${OSINT_AUTH:-}
      - OSINT_ADMIN_USER=${OSINT_ADMIN_USER:-admin}
      - OSINT_ADMIN_PASSWORD=${OSINT_ADMIN_PASSWORD:-}
      # API-токен (fallback для программных клиентов, заголовок X-Token):
      - OSINT_TOKEN=${OSINT_TOKEN:-}
      # Глубокий username-скан (WhatsMyName/Maigret/Sherlock — датасеты уже в образе):
      - USERNAME_DEEP=${USERNAME_DEEP:-}
    volumes:
      # Персистентность кейсов и собранных данных между перезапусками:
      - ./cases:/app/cases
      # БД пользователей/сессий (SQLite):
      - ./data:/app/data
      # Авторизация GHunt (creds.m) — переживает пересборку образа, но НЕ коммитится:
      - ghunt_creds:/root/.malfrats
    restart: unless-stopped

volumes:
  ghunt_creds:
