<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude OSINT — Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">OS</div>
        <div class="brand-text">
          <strong>Claude OSINT</strong>
          <span>Workspace</span>
        </div>
      </div>
      <nav class="nav" id="nav">
        <a class="nav-item active" data-view="dashboard"><span class="ic">◧</span> Обзор</a>
        <a class="nav-item" data-view="enrich"><span class="ic">⊹</span> Обогащение</a>
        <a class="nav-item" data-view="person"><span class="ic">⚇</span> Поиск ФЛ</a>
        <a class="nav-item" data-view="recon"><span class="ic">✷</span> Recon-граф</a>
        <a class="nav-item" data-view="sources"><span class="ic">▤</span> Источники</a>
        <a class="nav-item" data-view="skills"><span class="ic">◇</span> Скилы</a>
        <a class="nav-item" data-view="cases"><span class="ic">▥</span> Кейсы</a>
      </nav>
      <div class="sidebar-foot">
        <div class="legal">Только открытые источники. Этичный OSINT.</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <form class="globalsearch" id="globalsearch" autocomplete="off">
          <select id="g-type" class="field" title="Тип сущности"></select>
          <select id="g-country" class="field" title="Страна"></select>
          <input id="g-value" class="field grow" type="text" placeholder="Значение: ЄДРПОУ, домен, email, ПІБ, IP, ник, crypto-адрес, борт, IMO…">
          <button class="btn primary" type="submit">Обогатить</button>
        </form>
        <button class="iconbtn" id="theme-toggle" title="Тема">◐</button>
      </header>

      <main class="content" id="content"><!-- views injected --></main>
    </div>
  </div>

  <!-- View templates -->
  <template id="tpl-dashboard">
    <section class="view">
      <div class="view-head">
        <h1>Обзор</h1>
        <p class="muted">Единое пространство OSINT: движок обогащения, источники по странам, плейбуки, кейсы.</p>
      </div>
      <div class="stats" id="stats"></div>
      <div class="grid-2">
        <div class="panel">
          <div class="panel-head"><h2>Быстрый старт</h2></div>
          <div class="panel-body quickstart">
            <button class="chip" data-quick="company|ua|14360570">🇺🇦 Компания (ЄДРПОУ)</button>
            <button class="chip" data-quick="domain||example.com">Домен</button>
            <button class="chip" data-quick="person|ua|Зеленський Володимир Олександрович">🇺🇦 Персона (ПІБ)</button>
            <button class="chip" data-quick="email||test@example.com">Email</button>
            <button class="chip" data-quick="ip||8.8.8.8">IP (порты/репутация)</button>
            <button class="chip" data-quick="username||torvalds">Username</button>
            <button class="chip" data-quick="crypto||1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa">₿ Crypto</button>
            <button class="chip" data-quick="aircraft||UR-PSR">✈ Борт</button>
            <button class="chip" data-quick="vessel||IMO 9074729">⚓ Судно</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><h2>Энричеры</h2></div>
          <div class="panel-body" id="enricher-map"></div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-enrich">
    <section class="view">
      <div class="view-head"><h1>Обогащение</h1>
        <p class="muted">Сущность → граф связей. Факты с provenance и оценкой достоверности.</p></div>
      <div class="enrich-layout">
        <div class="panel result-panel">
          <div class="panel-head">
            <h2 id="result-title">Результат</h2>
            <div class="tabs" id="result-tabs">
              <button class="tab active" data-tab="findings">Факты</button>
              <button class="tab" data-tab="graph">Граф</button>
              <button class="tab" data-tab="nodes">Сущности</button>
              <button class="tab" data-tab="json">JSON</button>
            </div>
          </div>
          <div class="panel-body" id="result-body">
            <div class="empty" id="result-empty">
              <div class="empty-mark">⊹</div>
              <p>Введите сущность в строке поиска сверху и нажмите «Обогатить».</p>
            </div>
            <div class="tabpane" data-pane="findings" hidden></div>
            <div class="tabpane" data-pane="graph" hidden><div id="graph"></div></div>
            <div class="tabpane" data-pane="nodes" hidden></div>
            <div class="tabpane" data-pane="json" hidden><pre id="json-out" class="code"></pre></div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-person">
    <section class="view">
      <div class="view-head"><h1>Поиск физлица</h1>
        <p class="muted">Интеллектуальный поиск по открытым источникам: варианты имени, реестры UA/RU/межд., пивот селекторов.</p></div>
      <div class="basis-bar" id="basis-bar"></div>
      <form class="person-form panel" id="person-form">
        <div class="panel-body pform-grid">
          <label>ФИО / ПІБ <span class="req">*</span><input id="p-name" class="field" placeholder="Прізвище Ім'я По-батькові" required></label>
          <label>Дата рождения<input id="p-dob" class="field" type="date"></label>
          <label>РНОКПП / ИНН<input id="p-rnokpp" class="field" placeholder="10 (UA) / 12 (RU) цифр"></label>
          <label>Email (если есть)<input id="p-email" class="field" placeholder="name@example.com"></label>
          <label>Телефон (если есть)<input id="p-phone" class="field" placeholder="+380…"></label>
          <label>Username (если есть)<input id="p-username" class="field" placeholder="ник"></label>
          <div class="pform-countries">
            <span class="muted">Страны:</span>
            <label class="cb"><input type="checkbox" value="ua" checked> 🇺🇦 UA</label>
            <label class="cb"><input type="checkbox" value="ru" checked> 🇷🇺 RU</label>
            <label class="cb"><input type="checkbox" value="intl" checked> 🌍 межд.</label>
          </div>
          <button class="btn primary" type="submit">Искать</button>
        </div>
      </form>
      <div id="person-result"></div>
    </section>
  </template>

  <template id="tpl-recon">
    <section class="view">
      <div class="view-head"><h1>Recon-граф личности</h1>
        <p class="muted">Многошаговый пивотинг открытых источников + движок корреляции: каждая находка размечена тиром достоверности связи с объектом.</p></div>
      <div class="basis-bar" id="recon-basis-warn">⚖️ Разведка личности — только при правовом основании. Поле «Основание» обязательно; без него запуск заблокирован.</div>
      <form class="person-form panel" id="recon-form">
        <div class="panel-body pform-grid">
          <label>⚖️ Правовое основание <span class="req">*</span><input id="r-basis" class="field" placeholder="KYC контрагента / DD / расследование…" required></label>
          <label>ФИО / ПІБ<input id="r-name" class="field" placeholder="Прізвище Ім'я"></label>
          <label>Email(ы)<input id="r-email" class="field" placeholder="через запятую"></label>
          <label>Username(ы)<input id="r-username" class="field" placeholder="через запятую"></label>
          <label>GitHub<input id="r-github" class="field" placeholder="ник(и)"></label>
          <label>Телефон<input id="r-phone" class="field" placeholder="+380…"></label>
          <label>Глубина (hops)<select id="r-hops" class="field"><option>1</option><option selected>2</option><option>3</option></select></label>
          <button class="btn primary" type="submit">Запустить recon</button>
        </div>
      </form>
      <div id="recon-result"></div>
    </section>
  </template>

  <template id="tpl-sources">
    <section class="view">
      <div class="view-head"><h1>Источники</h1>
        <p class="muted">Открытые реестры по странам. Приоритет — Украина.</p></div>
      <div class="tabs" id="source-tabs"></div>
      <div class="panel"><div class="panel-body md" id="source-content"></div></div>
    </section>
  </template>

  <template id="tpl-skills">
    <section class="view">
      <div class="view-head"><h1>Скилы (плейбуки)</h1>
        <p class="muted">Пошаговые методики. В Claude Code вызываются автоматически по задаче.</p></div>
      <div class="cards" id="skills-list"></div>
    </section>
  </template>

  <template id="tpl-cases">
    <section class="view">
      <div class="view-head"><h1>Кейсы</h1>
        <p class="muted">Расследования. Структура — из <code>cases/_TEMPLATE</code>.</p></div>
      <div class="cards" id="cases-list"></div>
    </section>
  </template>

  <script defer src="/static/app.js"></script>
</body>
</html>
