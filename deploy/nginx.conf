# Пример reverse-proxy с TLS через nginx. Сертификат получи отдельно
# (certbot/acme.sh). Замени osint.example.com и пути к сертификатам.

server {
    listen 80;
    server_name osint.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name osint.example.com;

    ssl_certificate     /etc/letsencrypt/live/osint.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/osint.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (прогресс скана): отключить буферизацию, держать соединение
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
